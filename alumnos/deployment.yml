apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: webapp:latest
          imagePullPolicy: Never
          env:
            - name: APP_ENV
              value: "production"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: logs-volume
              mountPath: /app/logs
      volumes:
        - name: config-volume
          configMap:
            name: app-config
        - name: logs-volume
          persistentVolumeClaim:
            claimName: app-logs-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080